<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURUM — Relógios de Luxo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8CC80;
    --gold-dark: #8B6914;
    --black: #080808;
    --dark: #111010;
    --dark2: #1A1A1A;
    --cream: #F5F0E8;
    --cream2: #EDE8DC;
    --text-muted: #888;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 10px; height: 10px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.15s ease;
    opacity: 0.6;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 60px;
    background: linear-gradient(to bottom, rgba(8,8,8,0.95), transparent);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 10px;
    color: var(--gold);
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 44px;
    list-style: none;
  }
  .nav-links a {
    color: var(--cream);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.3s, color 0.3s;
  }
  .nav-links a:hover { opacity: 1; color: var(--gold); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }
  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 140px 60px 80px 60px;
    position: relative;
    z-index: 2;
  }
  .hero-eyebrow {
    font-size: 9px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(54px, 6vw, 88px);
    font-weight: 300;
    line-height: 1.05;
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }
  .hero-title em {
    font-style: italic;
    color: var(--gold);
  }
  .hero-desc {
    font-size: 13px;
    line-height: 2;
    color: var(--text-muted);
    max-width: 380px;
    margin-bottom: 50px;
    opacity: 0;
    animation: fadeUp 1s ease 0.7s forwards;
  }
  .hero-cta {
    display: flex;
    gap: 20px;
    align-items: center;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--black);
    text-decoration: none;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 16px 36px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    transition: background 0.3s, transform 0.2s;
    cursor: none;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
  .btn-ghost {
    color: var(--cream);
    text-decoration: none;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.5;
    transition: opacity 0.3s;
    cursor: none;
  }
  .btn-ghost:hover { opacity: 1; }

  .hero-right {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .hero-watch-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #1e1a10 0%, var(--black) 70%);
  }
  .hero-ring {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.15);
    animation: rotateSlow 30s linear infinite;
  }
  .hero-ring:nth-child(2) {
    width: 380px; height: 380px;
    border-color: rgba(201,168,76,0.08);
    animation-direction: reverse;
    animation-duration: 20s;
  }
  .watch-svg-wrap {
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 1.5s ease 0.8s forwards;
  }
  .watch-svg-wrap svg {
    width: 300px;
    filter: drop-shadow(0 0 60px rgba(201,168,76,0.3));
  }

  .hero-stat-row {
    position: absolute;
    bottom: 50px;
    left: 60px;
    display: flex;
    gap: 50px;
    opacity: 0;
    animation: fadeUp 1s ease 1.1s forwards;
    z-index: 2;
  }
  .hero-stat span { display: block; }
  .hero-stat .num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 300;
    color: var(--gold);
  }
  .hero-stat .label {
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 60px;
    margin: 0;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(201,168,76,0.2); }
  .divider-icon {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold);
    opacity: 0.5;
  }

  /* COLLECTION */
  .collection {
    padding: 100px 60px;
  }
  .section-label {
    font-size: 9px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 4vw, 56px);
    font-weight: 300;
    margin-bottom: 60px;
    max-width: 500px;
    line-height: 1.1;
  }
  .section-title em { font-style: italic; color: var(--gold); }

  .watches-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .watch-card {
    background: var(--dark2);
    padding: 40px 30px;
    position: relative;
    overflow: hidden;
    transition: transform 0.4s ease;
    cursor: none;
  }
  .watch-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.05), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .watch-card:hover::before { opacity: 1; }
  .watch-card:hover { transform: translateY(-6px); }
  .watch-card:hover .watch-card-img svg {
    filter: drop-shadow(0 0 40px rgba(201,168,76,0.4));
  }

  .watch-card-tag {
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 30px;
    opacity: 0.7;
  }
  .watch-card-img {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
    min-height: 180px;
    align-items: center;
  }
  .watch-card-img svg { width: 160px; transition: filter 0.4s; }

  .watch-card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    margin-bottom: 8px;
  }
  .watch-card-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .watch-card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 24px;
  }
  .watch-card-price small { font-size: 12px; font-family: 'Montserrat', sans-serif; color: var(--text-muted); font-weight: 300; display: block; margin-bottom: 4px; letter-spacing: 1px; }
  .btn-order {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold);
    text-decoration: none;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 13px 24px;
    font-family: 'Montserrat', sans-serif;
    transition: all 0.3s;
    cursor: none;
  }
  .btn-order:hover {
    background: var(--gold);
    color: var(--black);
    border-color: var(--gold);
  }
  .btn-order svg { width: 14px; height: 14px; }

  /* FEATURED */
  .featured {
    padding: 80px 60px;
    background: var(--dark2);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .featured-img {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .featured-img::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%);
  }
  .featured-img svg { width: 280px; position: relative; z-index: 1; filter: drop-shadow(0 20px 60px rgba(201,168,76,0.25)); }

  .featured-content .section-label { margin-bottom: 20px; }
  .featured-content .section-title { margin-bottom: 20px; }
  .featured-desc {
    font-size: 13px;
    line-height: 2;
    color: var(--text-muted);
    margin-bottom: 40px;
  }
  .specs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }
  .spec { border-left: 1px solid rgba(201,168,76,0.3); padding-left: 16px; }
  .spec-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .spec-val { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--cream); }

  /* ABOUT */
  .about {
    padding: 120px 60px;
    text-align: center;
  }
  .about-inner { max-width: 700px; margin: 0 auto; }
  .about-inner .section-title { margin: 0 auto 24px; }
  .about-desc {
    font-size: 14px;
    line-height: 2.2;
    color: var(--text-muted);
    margin-bottom: 60px;
  }
  .about-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    text-align: left;
    border-top: 1px solid rgba(201,168,76,0.15);
    padding-top: 60px;
    margin-top: 20px;
  }
  .about-item .icon {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    color: var(--gold);
    margin-bottom: 16px;
    opacity: 0.6;
  }
  .about-item h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 10px;
  }
  .about-item p { font-size: 12px; color: var(--text-muted); line-height: 2; }

  /* CTA SECTION */
  .cta-section {
    padding: 100px 60px;
    background: linear-gradient(135deg, #0d0b07, #1a1508, #0d0b07);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .cta-section::before {
    content: 'AURUM';
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: 220px;
    color: rgba(201,168,76,0.04);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 20px;
  }
  .cta-section .section-title { max-width: 600px; margin: 0 auto 16px; }
  .cta-section .section-label { margin-bottom: 24px; }
  .cta-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 40px; line-height: 2; }
  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #25D366;
    color: #fff;
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 18px 44px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    transition: all 0.3s;
    cursor: none;
  }
  .btn-whatsapp:hover { background: #128C7E; transform: translateY(-3px); box-shadow: 0 20px 40px rgba(37,211,102,0.25); }
  .btn-whatsapp svg { width: 20px; height: 20px; }

  /* FOOTER */
  footer {
    border-top: 1px solid rgba(201,168,76,0.15);
    padding: 50px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    letter-spacing: 8px;
    color: var(--gold);
    opacity: 0.7;
  }
  .footer-copy {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
  }
  .footer-links { display: flex; gap: 30px; }
  .footer-links a { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; text-decoration: none; text-transform: uppercase; transition: color 0.3s; }
  .footer-links a:hover { color: var(--gold); }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes rotateSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes tickAnim {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); }

  @media(max-width: 900px) {
    nav { padding: 24px 24px; }
    .nav-links { display: none; }
    .hero { grid-template-columns: 1fr; }
    .hero-right { min-height: 360px; }
    .hero-left { padding: 120px 24px 60px; }
    .hero-stat-row { left: 24px; bottom: 30px; gap: 30px; }
    .collection { padding: 60px 24px; }
    .watches-grid { grid-template-columns: 1fr; }
    .featured { grid-template-columns: 1fr; padding: 60px 24px; }
    .about { padding: 60px 24px; }
    .about-grid { grid-template-columns: 1fr; }
    .cta-section { padding: 60px 24px; }
    footer { flex-direction: column; gap: 20px; padding: 40px 24px; text-align: center; }
    .footer-links { flex-wrap: wrap; justify-content: center; }
    .divider { padding: 0 24px; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">AURUM</a>
  <ul class="nav-links">
    <li><a href="#colecao">Coleção</a></li>
    <li><a href="#destaque">Destaque</a></li>
    <li><a href="#sobre">Sobre</a></li>
    <li><a href="#contato">Contacto</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <p class="hero-eyebrow">Haute Horlogerie · Desde 1987</p>
    <h1 class="hero-title">
      O Tempo<br>é uma <em>Arte</em>
    </h1>
    <p class="hero-desc">
      Relógios manufaturados à mão, com materiais raros e mecanismos de precisão suíça. Cada peça é um legado que atravessa gerações.
    </p>
    <div class="hero-cta">
      <a href="#colecao" class="btn-primary">Ver Coleção</a>
      <a href="#sobre" class="btn-ghost">Nossa História →</a>
    </div>
  </div>

  <div class="hero-right">
    <div class="hero-watch-bg"></div>
    <div class="hero-ring"></div>
    <div class="hero-ring"></div>
    <div class="watch-svg-wrap">
      <!-- Luxury watch SVG illustration -->
      <svg viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg">
        <!-- Strap top -->
        <rect x="112" y="10" width="76" height="80" rx="8" fill="#1a1a1a" stroke="#C9A84C" stroke-width="1"/>
        <line x1="120" y1="30" x2="180" y2="30" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
        <line x1="120" y1="45" x2="180" y2="45" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
        <line x1="120" y1="60" x2="180" y2="60" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
        <line x1="120" y1="75" x2="180" y2="75" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
        <!-- Strap buckle holes -->
        <circle cx="150" cy="25" r="3" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>
        <circle cx="150" cy="40" r="3" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>

        <!-- Watch case outer -->
        <circle cx="150" cy="185" r="108" fill="#111" stroke="#C9A84C" stroke-width="2.5"/>
        <!-- Bezel -->
        <circle cx="150" cy="185" r="100" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
        <circle cx="150" cy="185" r="88" fill="#0a0a0a" stroke="#C9A84C" stroke-width="1.5"/>
        <!-- Dial -->
        <circle cx="150" cy="185" r="80" fill="#080808"/>
        <!-- Dial texture rings -->
        <circle cx="150" cy="185" r="70" fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
        <circle cx="150" cy="185" r="55" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>

        <!-- Hour markers -->
        <g stroke="#C9A84C" stroke-width="2">
          <!-- 12 -->
          <line x1="150" y1="112" x2="150" y2="122"/>
          <!-- 3 -->
          <line x1="223" y1="185" x2="213" y2="185"/>
          <!-- 6 -->
          <line x1="150" y1="258" x2="150" y2="248"/>
          <!-- 9 -->
          <line x1="77" y1="185" x2="87" y2="185"/>
        </g>
        <!-- Minor markers -->
        <g stroke="#C9A84C" stroke-width="0.8" opacity="0.5">
          <line x1="186" y1="120" x2="183" y2="125"/>
          <line x1="213" y1="148" x2="208" y2="151"/>
          <line x1="213" y1="222" x2="208" y2="219"/>
          <line x1="186" y1="250" x2="183" y2="245"/>
          <line x1="114" y1="120" x2="117" y2="125"/>
          <line x1="87" y1="148" x2="92" y2="151"/>
          <line x1="87" y1="222" x2="92" y2="219"/>
          <line x1="114" y1="250" x2="117" y2="245"/>
        </g>

        <!-- Sub-dial (chronograph) -->
        <circle cx="150" cy="215" r="18" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="0.8"/>
        <circle cx="150" cy="215" r="14" fill="#0e0e0e"/>
        <line x1="150" y1="203" x2="150" y2="210" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>
        <line x1="162" y1="215" x2="155" y2="215" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>

        <!-- Hands -->
        <!-- Hour hand -->
        <line x1="150" y1="185" x2="128" y2="155" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
        <!-- Minute hand -->
        <line x1="150" y1="185" x2="185" y2="135" stroke="#E8CC80" stroke-width="2" stroke-linecap="round"/>
        <!-- Second hand -->
        <line x1="150" y1="185" x2="160" y2="240" stroke="#C9A84C" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
        <!-- Center dot -->
        <circle cx="150" cy="185" r="5" fill="#C9A84C"/>
        <circle cx="150" cy="185" r="2.5" fill="#080808"/>

        <!-- Logo text on dial -->
        <text x="150" y="175" text-anchor="middle" fill="#C9A84C" font-size="8" font-family="Cormorant Garamond, serif" letter-spacing="3" opacity="0.8">AURUM</text>
        <text x="150" y="162" text-anchor="middle" fill="rgba(201,168,76,0.4)" font-size="5" font-family="Montserrat, sans-serif" letter-spacing="2">SWISS MADE</text>

        <!-- Crown -->
        <rect x="255" y="179" width="16" height="12" rx="6" fill="#1a1a1a" stroke="#C9A84C" stroke-width="1"/>

        <!-- Strap bottom -->
        <rect x="112" y="270" width="76" height="80" rx="8" fill="#1a1a1a" stroke="#C9A84C" stroke-width="1"/>
        <line x1="120" y1="285" x2="180" y2="285" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
        <line x1="120" y1="300" x2="180" y2="300" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
        <line x1="120" y1="315" x2="180" y2="315" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
        <line x1="120" y1="330" x2="180" y2="330" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
      </svg>
    </div>

    <!-- Stats -->
